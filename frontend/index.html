<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Encuentra los mejores accesorios y productos de belleza en Managua, Nicaragua. Envíos disponibles." />

  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://ferlis-accesorios.netlify.app/" />
  <meta property="og:title" content="Ferlis Accesorios | Catálogo Online" />
  <meta property="og:description"
    content="Explora nuestra colección de accesorios y belleza. ¡Pregunta por tus favoritos vía WhatsApp!" />
  <meta property="og:image" content="https://ferlis-accesorios.netlify.app/og-preview.png" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://ferlis-accesorios.netlify.app/" />
  <meta name="twitter:title" content="Ferlis Accesorios" />
  <meta name="twitter:description" content="Accesorios y belleza en Managua, Nicaragua." />
  <meta name="twitter:image" content="https://ferlis-accesorios.netlify.app/og-preview.png" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <title>%VITE_STORE_NAME%</title>
  <script>
    (function () {
      const icons = [
        "add", "arrow_left", "arrow_right", "check_circle",
        "chevron_right", "close", "delete", "edit",
        "find_in_page", "info", "notifications",
        "notifications_off", "search", "search_off", "warning", "inventory_2", "first_page", "menu", "cloud_off", "refresh", "zoom_in", "arrow_forward", "arrow_back"
      ];

      icons.sort();

      const baseUrl = "https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:FILL,GRAD,opsz,wght@0,0,24,400";
      const iconParam = `&icon_names=${icons.join(',')}`;
      const finalUrl = baseUrl + iconParam;

      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = finalUrl;
      document.head.appendChild(link);
    })();
  </script>
  <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Store",
  "name": "Ferlis Accesorios",
  "description": "Venta de accesorios en Managua",
  "url": "https://ferlis-accesorios.netlify.app",
  "address": {
    "@type": "PostalAddress",
    "addressLocality": "Managua",
    "addressCountry": "NI"
  }
}
</script>
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
