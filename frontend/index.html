<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <title>%VITE_STORE_NAME%</title>
  <script>
    (function () {
      const icons = [
        "add", "arrow_left", "arrow_right", "check_circle",
        "chevron_right", "close", "delete", "edit",
        "find_in_page", "info", "notifications",
        "notifications_off", "search", "search_off", "warning", "inventory_2", "first_page", "menu", "cloud_off", "refresh", "zoom_in", "arrow_forward"
      ];

      icons.sort();

      const baseUrl = "https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:FILL,GRAD,opsz,wght@0,0,24,400";
      const iconParam = `&icon_names=${icons.join(',')}`;
      const finalUrl = baseUrl + iconParam;

      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = finalUrl;
      document.head.appendChild(link);
    })();
  </script>
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
